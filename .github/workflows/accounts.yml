name: Build Account Map

on:
  schedule:
    # Staggered away from the other workflows and off the busy top-of-hour slots.
    - cron: "43 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Build the account map
        run: python build_accounts.py

      - name: Publish the page
        run: |
          git config user.name "tender-bot"
          git config user.email "tender-bot@users.noreply.github.com"
          git add docs/accounts.html
          git commit -m "Update account map" || echo "No changes"
          git pull --rebase origin main || true
          git push
