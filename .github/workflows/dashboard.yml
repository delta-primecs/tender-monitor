name: Build Tender Dashboard

on:
  schedule:
    - cron: "0 * * * *"   # every hour (GitHub may run a little late — that's fine)
  workflow_dispatch:       # lets you press "Run workflow" to build it on demand

permissions:
  contents: write          # needed to save docs/index.html back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Build the dashboard
        run: python build_dashboard.py

      - name: Publish the updated page
        run: |
          git config user.name "tender-bot"
          git config user.email "tender-bot@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Update dashboard" || echo "No changes"
          git push
